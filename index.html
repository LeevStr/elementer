<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ELEMENTER</title>
  <meta name="description" content="撃つか、守るか。弾を盾にするアクション×シューティング！">
  <style>
    :root { color-scheme: dark; --bg:#101116; --panel:#191c23; --ink:#f5f7fb; --muted:#aeb7c6; --line:#303541; --hot:#ffce4a; --blue:#59b9ff; --red:#ff6b5f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(89,185,255,.22), transparent 32rem), linear-gradient(180deg,#101116,#151821 42%,#101116); color:var(--ink); }
    main { width:min(1080px, calc(100% - 32px)); margin:0 auto; }
    .hero { min-height:88vh; display:grid; grid-template-columns: minmax(0,1fr) minmax(280px,420px); gap:44px; align-items:center; padding:44px 0 28px; }
    .mark { display:flex; align-items:center; gap:16px; margin-bottom:28px; color:var(--muted); font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    .mark img { width:58px; height:58px; border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,.35); }
    h1 { margin:0; font-size:clamp(52px, 9vw, 116px); line-height:.92; letter-spacing:0; }
    .lead { margin:24px 0 0; max-width:660px; color:#dce3ef; font-size:clamp(20px, 3.2vw, 34px); line-height:1.35; font-weight:800; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:34px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:48px; padding:0 20px; border:1px solid var(--line); border-radius:8px; color:var(--ink); text-decoration:none; font-weight:800; background:#222734; }
    .btn.primary { background:linear-gradient(135deg,var(--hot),#ff7c4a); color:#17120b; border:0; }
    .btn.disabled { color:#7f8795; background:#191c23; cursor:not-allowed; }
    .device { aspect-ratio:9/16; border:1px solid rgba(255,255,255,.16); border-radius:28px; padding:10px; background:#090a0e; box-shadow:0 30px 90px rgba(0,0,0,.5); transform:rotate(2deg); }
    .device img { width:100%; height:100%; object-fit:cover; border-radius:20px; display:block; }
    section { padding:34px 0 64px; }
    h2 { margin:0 0 18px; font-size:28px; }
    .gallery { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:14px; }
    .gallery img { width:100%; aspect-ratio:9/16; object-fit:cover; border-radius:8px; border:1px solid var(--line); background:#090a0e; }
    footer { border-top:1px solid var(--line); padding:26px 0 40px; color:var(--muted); display:flex; flex-wrap:wrap; gap:14px; justify-content:space-between; }
    footer a { color:#dce3ef; }
    @media (max-width: 760px) { main { width:min(100% - 22px, 540px); } .hero { min-height:auto; grid-template-columns:1fr; gap:28px; padding-top:28px; } .device { max-width:300px; margin:auto; transform:none; } .gallery { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  </style>
</head>
